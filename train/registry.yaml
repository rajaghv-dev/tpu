# Training task registry — Stage 1.6+ (training observability layer).
#
# Each entry is a complete training-experiment specification. Synthetic
# inputs (numpy seed=42) — same hardware-only-comparison philosophy as
# benchmarks/. No real datasets, no data plumbing — every byte of the
# input batch is generated on the fly. That keeps the runner self-contained
# and means timings reflect *only* the model + optimizer + accelerator
# stack, not data-loading idiosyncrasies.
#
# Schema (additions vs. earlier revisions marked *new*):
#   id                       — registry key
#   hf_id                    — HuggingFace pretrained checkpoint to start from
#   task                     — sequence-classification | causal-lm | image-classification
#   domain                   — dashboard grouping
#   architecture_family      — transformer_encoder | transformer_decoder | cnn | vit_hierarchical
#   attention_variant        — mha | gqa | mqa | none
#   positional_encoding      — absolute | rope | alibi | none
#   is_moe                   — bool
#   gated, risk_level        — same semantics as models/registry.yaml
#   total_params_M, active_params_M — for cost/MFU dashboards
#   input_type               — text | image
#   default_seq_len, vocab_size — text inputs only
#   image_size               — image inputs only ([C,H,W])
#   default_batch_size       — per-step micro-batch
#   num_labels               — classification heads only
#   default_steps            — training-loop length (smoke suite shortens this)
#   default_eval_steps       — eval phase length
#   default_lr               — peak LR
#   default_warmup_steps     — LR linear warmup
#   default_weight_decay
#   default_optimizer        — adamw | sgd | lion | adafactor
#   default_max_grad_norm    — *new* global-norm clipping threshold (0.0 disables)
#   default_grad_accum_steps — *new* gradient accumulation (1 = no accumulation)
#   default_lr_schedule      — *new* linear | cosine | constant
#
# Sizing convention: defaults are chosen to fit a single v5e-1 chip (16 GB
# HBM) without gradient checkpointing. Batch sizes were dialed in by hand
# to leave ≈30 % HBM headroom for attention + optimizer state.

tasks:

  # ───────────────────────────────────────────────────────────────────────
  # NLP — encoder / sequence classification
  # ───────────────────────────────────────────────────────────────────────

  - id: distilbert_finetune
    hf_id: distilbert-base-uncased
