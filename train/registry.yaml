    domain: nlp_encoder
    architecture_family: transformer_encoder
    attention_variant: mha
    positional_encoding: absolute
    is_moe: false
    gated: false
    risk_level: low
    total_params_M: 66
    active_params_M: 66
    input_type: text
    vocab_size: 30522
    default_seq_len: 128
    default_batch_size: 64
    num_labels: 2
    default_steps: 200
    default_eval_steps: 10
    default_lr: 5.0e-5
    default_warmup_steps: 20
    default_weight_decay: 0.01
    default_optimizer: adamw
    default_max_grad_norm: 1.0
    default_grad_accum_steps: 1
    default_lr_schedule: linear

  - id: bert_finetune
    hf_id: bert-base-uncased
    task: sequence-classification
