# Prometheus config for the cloud_tpu_lab local stack.
#
# The exporter (`observability/exporters/cloud_tpu_metrics_exporter.py`)
# runs on the host, not in a container, so we scrape it via
# `host.docker.internal`. The docker-compose.yml maps that name to
# `host-gateway` for Linux compatibility.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "cloud_tpu_lab"

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus scraping itself — useful for diagnosing the stack.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # The cloud_tpu_lab Python exporter.
  - job_name: "cloud_tpu_metrics_exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          app: "cloud_tpu_lab"
          source: "exporter"

  # GCP Cloud Monitoring (Stackdriver) — pulls real TPU infrastructure metrics
  # via the stackdriver-exporter sidecar. Cloud Monitoring rate-limits
  # aggressively (~6000 read calls/min/project), so we deliberately keep
  # scrape_interval at 60s and grant a 30s timeout (the exporter has to
  # round-trip to googleapis.com per scrape).
  - job_name: 'gcp_cloud_monitoring_tpu'
    static_configs:
      - targets: ['stackdriver-exporter:9255']
        labels:
          app: "cloud_tpu_lab"
          source: "gcp_monitoring"
    scrape_interval: 60s
    scrape_timeout: 30s
